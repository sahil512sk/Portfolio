<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Admin Form</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">
    <h2>Update Portfolio Details</h2>

    <form id="dataForm" enctype="multipart/form-data">

      <fieldset>
        <legend>Personal Information</legend>

        <label>Full Name</label>
        <input type="text" name="name">

        <label>Role / Title</label>
        <input type="text" name="role">

        <label>Email</label>
        <input type="email" name="email">

        <label>WhatsApp link</label>
        <input type="url" name="whatsapp">

        <label>Github link</label>
        <input type="url" name="github">

        <label>About You</label>
        <textarea name="about" rows="4"></textarea>

        <label>Upload CV (PDF)</label>
        <input type="file" name="cv" accept=".pdf">

        <label>Upload Avatar (Image)</label>
        <input type="file" name="avatar" accept="image/*">
      </fieldset>

      <fieldset>
        <legend>Skills</legend>

        <label>Frontend (comma separated)</label>
        <input type="text" name="frontend" placeholder="HTML, CSS, JavaScript, Laravel">

        <label>Backend (comma separated)</label>
        <input type="text" name="backend" placeholder="PHP, Node.js, Express, MongoDB">

        <label>Tools (comma separated)</label>
        <input type="text" name="tools" placeholder="Github, VS Code, Figma">
      </fieldset>

      <fieldset id="projects-fieldset">
        <legend>Project Details</legend>

        <div id="projects-container">
        </div>

        <button type="button" id="add-project-btn" class="btn secondary">+ Add Project</button>
      </fieldset>

      <button type="submit" class="btn primary">Save Portfolio</button>

    </form>
  </div>

  <script src="script.js"></script>
  <script>document.getElementById('add-project-btn').addEventListener('click', function () {
      const newDiv = document.createElement('div');
      newDiv.classList.add('project');

      const titleLabel = document.createElement('label');
      titleLabel.textContent = 'Title:';
      const titleInput = document.createElement('input');
      titleInput.type = 'text';
      titleInput.placeholder = 'Enter project title';
      titleInput.name = 'title';

      const descriptionLabel = document.createElement('label');
      descriptionLabel.textContent = 'Description:';
      const descriptionInput = document.createElement('textarea');
      descriptionInput.placeholder = 'Enter project description';
      descriptionInput.name = 'description';

      const gitLabel = document.createElement('label');
      gitLabel.textContent = 'GitLink:';
      const gitLinkInput = document.createElement('input');
      gitLinkInput.type = 'url';
      gitLinkInput.placeholder = 'Enter GitHub repository URL';
      gitLinkInput.name = 'gitlink';

      const liveLabel = document.createElement('label');
      liveLabel.textContent = 'Live Link:';
      const liveLinkInput = document.createElement('input');
      liveLinkInput.placeholder = 'Enter live demo link';
      liveLinkInput.name = 'livelink';

      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove Project';
      removeBtn.classList.add('remove-btn');
      removeBtn.addEventListener('click', function () {
        newDiv.remove();
      });

      newDiv.appendChild(titleLabel);
      newDiv.appendChild(titleInput);
      newDiv.appendChild(descriptionLabel);
      newDiv.appendChild(descriptionInput);
      newDiv.appendChild(gitLabel);
      newDiv.appendChild(gitLinkInput);
      newDiv.appendChild(liveLabel);
      newDiv.appendChild(liveLinkInput);
      newDiv.appendChild(removeBtn);

      const projectContainer = document.getElementById('projects-container');
      projectContainer.appendChild(newDiv);
    });</script>
</body>

</html>
